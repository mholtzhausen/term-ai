name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.6"
      - name: Build
        run: |
          mkdir -p build/bin
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build \
            -ldflags "-X github.com/mhai-org/term-ai/cmd.Version=${{ github.ref_name }}" \
            -o build/bin/ai-${{ matrix.goos }}-${{ matrix.goarch }} main.go
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/ai-*
